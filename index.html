<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ticficha</title>

    <meta name="theme-color" content="#122633">

    <!-- Redirección inmediata a la app (fallback si el JS tarda) -->
    <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbxXHaLP5Nm7NAXxNskc5nsThgRoIkFPhaw3QQrLmtciwKroxdmSWiDdq-bP9U36B4LD/exec">

    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" href="icons/favicon.ico">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #DDDEDD;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #E2E8F0;
            border-top: 5px solid #9AC343;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .loading-text {
            color: #122633;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .fallback-link {
            display: none;
            margin-top: 1.5rem;
            padding: .75rem 1.5rem;
            background: #9AC343;
            color: #122633;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loading-text">Cargando ticficha...</div>
        <a id="fallback" class="fallback-link" href="#">Abrir aplicación</a>
    </div>

    <script>
        // URL /exec de tu Apps Script
        var APP_URL = "https://script.google.com/macros/s/AKfycbxXHaLP5Nm7NAXxNskc5nsThgRoIkFPhaw3QQrLmtciwKroxdmSWiDdq-bP9U36B4LD/exec";

        // Botón de respaldo por si la redirección automática no salta
        var fallback = document.getElementById("fallback");
        fallback.href = APP_URL;

        // Si en 2,5 s no ha redirigido, muestra el botón manual
        setTimeout(function () {
            fallback.style.display = "inline-block";
            document.querySelector(".loading-text").textContent = "Pulsa para abrir la aplicación";
        }, 2500);

        // Redirección automática
        window.location.replace(APP_URL);
    </script>
</body>
</html>
